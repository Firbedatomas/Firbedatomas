<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380" role="img" aria-label="Frambuesa — software for real restaurant operations" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Frambuesa</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6f0"/>
      <stop offset="0.45" stop-color="#ffc2dc"/>
      <stop offset="1" stop-color="#ef8fb6"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="0.16" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBerry" cx="0.95" cy="0.92" r="0.7">
      <stop offset="0" stop-color="#c2406b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c2406b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a2750"/>
      <stop offset="1" stop-color="#c2406b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="380" rx="20" fill="url(#glowTop)"/>
  <rect width="1280" height="380" rx="20" fill="url(#glowBerry)"/>
  <rect x="1.5" y="1.5" width="1277" height="377" rx="18.5" fill="none" stroke="#ffffff" stroke-opacity="0.55"/>

  <!-- Soft halo behind the mark -->
  <circle cx="208" cy="190" r="118" fill="#ffffff" fill-opacity="0.45"/>

  <!-- Official Frambuesa mark (light variant) -->
  <g transform="translate(104 78) scale(3.5)">
    <ellipse cx="31" cy="18" rx="2.5" ry="5.5" fill="#1D9E75"/>
    <ellipse cx="25" cy="20" rx="2.2" ry="5" fill="#1D9E75" transform="rotate(-32 25 20)"/>
    <ellipse cx="37" cy="20" rx="2.2" ry="5" fill="#1D9E75" transform="rotate(32 37 20)"/>
    <circle cx="21" cy="31" r="6" fill="#D4537E"/>
    <circle cx="31" cy="31" r="6" fill="#C2406B"/>
    <circle cx="41" cy="31" r="6" fill="#D4537E"/>
    <circle cx="26" cy="40" r="6" fill="#C2406B"/>
    <circle cx="36" cy="40" r="6" fill="#D4537E"/>
    <circle cx="31" cy="48" r="6" fill="#C2406B"/>
  </g>

  <!-- Text block -->
  <text x="404" y="128" fill="#a32f5a" font-size="22" font-weight="700" letter-spacing="6">RESTAURANT SOFTWARE · LATAM</text>
  <text x="402" y="222" fill="url(#wordmark)" font-size="104" font-weight="800" letter-spacing="-2">Frambuesa</text>
  <rect x="406" y="248" width="124" height="6" rx="3" fill="#d4547d"/>
  <text x="404" y="300" fill="#6e1f3c" font-size="29" font-weight="600">Software for real restaurant operations</text>
  <text x="404" y="340" fill="#9b4365" font-size="20" font-weight="600" letter-spacing="0.4">POS · QR Menu · Delivery · Stock · Billing · Printing · Multi-branch</text>
</svg>
