<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380" role="img" aria-label="Frambuesa — software for real restaurant operations" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Frambuesa</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c0a12"/>
      <stop offset="0.55" stop-color="#250d18"/>
      <stop offset="1" stop-color="#160810"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.18" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#d4547d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#d4547d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.92" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#7a1f3d" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7a1f3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd8e6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="380" rx="20" fill="url(#glowA)"/>
  <rect width="1280" height="380" rx="20" fill="url(#glowB)"/>
  <rect x="1" y="1" width="1278" height="378" rx="19" fill="none" stroke="#d4547d" stroke-opacity="0.18"/>

  <!-- Official Frambuesa mark, dark-background variant -->
  <g transform="translate(104 78) scale(3.5)">
    <ellipse cx="31" cy="18" rx="2.5" ry="5.5" fill="#5DCAA5"/>
    <ellipse cx="25" cy="20" rx="2.2" ry="5" fill="#5DCAA5" transform="rotate(-32 25 20)"/>
    <ellipse cx="37" cy="20" rx="2.2" ry="5" fill="#5DCAA5" transform="rotate(32 37 20)"/>
    <circle cx="21" cy="31" r="6" fill="#ED93B1"/>
    <circle cx="31" cy="31" r="6" fill="#D4537E"/>
    <circle cx="41" cy="31" r="6" fill="#ED93B1"/>
    <circle cx="26" cy="40" r="6" fill="#D4537E"/>
    <circle cx="36" cy="40" r="6" fill="#ED93B1"/>
    <circle cx="31" cy="48" r="6" fill="#D4537E"/>
  </g>

  <!-- Text block -->
  <text x="404" y="130" fill="#f4a9c4" font-size="22" font-weight="600" letter-spacing="6">RESTAURANT SOFTWARE · LATAM</text>
  <text x="402" y="222" fill="url(#wordmark)" font-size="104" font-weight="700" letter-spacing="-2">Frambuesa</text>
  <rect x="406" y="248" width="120" height="5" rx="2.5" fill="#d4547d"/>
  <text x="404" y="298" fill="#e7c2d2" font-size="29" font-weight="400">Software for real restaurant operations</text>
  <text x="404" y="338" fill="#9a7b88" font-size="20" font-weight="500" letter-spacing="0.5">POS · QR Menu · Delivery · Stock · Billing · Printing · Multi-branch</text>
</svg>
